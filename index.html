  <script src="/_sdk/0e8f359d3c23f6d5.editing_sdk.js" integrity="sha512-CBLuYm/olmgyMedTtPRFeqCRZcSWUh6/39ewyXAbnr1dsVHBACzZ59KGJZXvuWNHOHixfWegfuMN9JzmLEDIoA=="></script>
  <script>
    lucide.createIcons();

    // Nav
    const menuBtn = document.getElementById('menu-btn');
    const navOverlay = document.getElementById('nav-overlay');
    const navPanel = document.getElementById('nav-panel');
    const searchToggle = document.getElementById('search-toggle');
    const searchBar = document.getElementById('search-bar');

    menuBtn.addEventListener('click', () => { navOverlay.classList.remove('hidden'); navPanel.classList.remove('closed'); });
    function closeNav() { navOverlay.classList.add('hidden'); navPanel.classList.add('closed'); }
    navPanel.querySelectorAll('a[href^="#"]').forEach(a => a.addEventListener('click', closeNav));
    document.getElementById('nav-search-btn').addEventListener('click', (e) => { e.preventDefault(); closeNav(); searchBar.classList.remove('hidden'); document.getElementById('search-input').focus(); });
    searchToggle.addEventListener('click', () => { searchBar.classList.toggle('hidden'); if (!searchBar.classList.contains('hidden')) document.getElementById('search-input').focus(); });

    // AI Chat
    const chatPanel = document.getElementById('chat-panel');
    const aiToggle = document.getElementById('ai-toggle');
    const chatClose = document.getElementById('chat-close');
    const chatForm = document.getElementById('chat-form');
    const chatInput = document.getElementById('chat-input');
    const chatMessages = document.getElementById('chat-messages');

    aiToggle.addEventListener('click', () => chatPanel.classList.toggle('open'));
    chatClose.addEventListener('click', () => chatPanel.classList.remove('open'));

    const responses = {
      'merhaba': 'Merhaba! Size nasıl yardımcı olabilirim?',
      'selam': 'Selam! Sorunuz nedir?',
      'trabzon': 'Trabzon, Karadeniz\'in incisi! İş ilanları ve haberler için doğru yerdesiniz.',
      'iş': 'Güncel iş ilanlarını sitemizde takip edebilirsiniz. Instagram hesabımızdan da ilanları görebilirsiniz.',
      'hava': 'Karadeniz bölgesinde değişken hava koşulları bekleniyor. Şemsiyenizi yanınıza alın!',
      'trabzonspor': 'Trabzonspor taraftarı olarak gurur duymalısınız! En güncel spor haberleri sitemizde.',
      'iletişim': 'Instagram üzerinden bize ulaşabilirsiniz: @trabzon_is_ilani',
      'teşekkür': 'Rica ederim! Başka sorunuz varsa yardımcı olmaktan memnuniyet duyarım.',
    };

    function getAIResponse(msg) {
      const lower = msg.toLowerCase().trim();
      for (const [key, val] of Object.entries(responses)) {
        if (lower.includes(key)) return val;
      }
      return 'Bu konuda size yardımcı olabilirim. Daha fazla detay verir misiniz? ShopNex olarak her konuda net cevaplar sunmaya çalışıyorum.';
    }

    chatForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const msg = chatInput.value.trim();
      if (!msg) return;

      // User message
      const userDiv = document.createElement('div');
      userDiv.className = 'bg-red-600 text-white rounded-xl px-3 py-2 text-sm max-w-[85%] ml-auto';
      userDiv.textContent = msg;
      chatMessages.appendChild(userDiv);

      chatInput.value = '';

      // AI response
      setTimeout(() => {
        const aiDiv = document.createElement('div');
        aiDiv.className = 'bg-gray-100 rounded-xl px-3 py-2 text-sm max-w-[85%]';
        aiDiv.textContent = getAIResponse(msg);
        chatMessages.appendChild(aiDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }, 600);

      chatMessages.scrollTop = chatMessages.scrollHeight;
    });
  </script>
