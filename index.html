  <script src="/_sdk/0e8f359d3c23f6d5.editing_sdk.js" integrity="sha512-CBLuYm/olmgyMedTtPRFeqCRZcSWUh6/39ewyXAbnr1dsVHBACzZ59KGJZXvuWNHOHixfWegfuMN9JzmLEDIoA=="></script>
  <script>
        lucide.createIcons();

        const searchToggle = document.getElementById('search-toggle');
        const searchBar = document.getElementById('search-bar');
        searchToggle.addEventListener('click', () => {
            searchBar.classList.toggle('hidden');
            if (!searchBar.classList.contains('hidden')) document.getElementById('search-input').focus();
        });

        // AI Chat
        const chatPanel = document.getElementById('chat-panel');
        document.getElementById('ai-toggle').addEventListener('click', () => chatPanel.classList.toggle('open'));
        document.getElementById('chat-close').addEventListener('click', () => chatPanel.classList.remove('open'));

        const responses = {
            'merhaba': 'Merhaba! Ben ShopNex AI\'yım. Size nasıl yardımcı olabilirim?',
            'selam': 'Selam! Hangi konuda yardımcı olmamı istersiniz?',
            'trabzon': 'Trabzon, Karadeniz\'in incisi! İş ilanları ve haberler için doğru yerdesiniz.',
            'iş': 'Güncel iş ilanları için Instagram: @trabzon_is_ilani',
            'trabzonspor': 'Trabzonspor haberleri için spor bölümümüze göz atın!',
            'iletişim': 'Instagram: @trabzon_is_ilani üzerinden bize ulaşın.',
            'teşekkür': 'Rica ederim! Başka sorunuz varsa yardımcı olmaktan memnuniyet duyarım.',
            'shopnex': 'Ben ShopNex AI! Her konuda net cevaplar vermeyi hedefliyorum.',
        };

        function getAIResponse(msg) {
            const lower = msg.toLowerCase().trim();
            for (const [key, val] of Object.entries(responses)) {
                if (lower.includes(key)) return val;
            }
            return 'Sorunuzu biraz daha açıklayabilir misiniz? İş ilanları, haberler, spor veya teknoloji hakkında yardımcı olabilirim.';
        }

        document.getElementById('chat-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const msg = document.getElementById('chat-input').value.trim();
            if (!msg) return;
            const chatMessages = document.getElementById('chat-messages');
            const userDiv = document.createElement('div');
            userDiv.className = 'bg-red-600 text-white rounded-xl px-3 py-2 text-sm max-w-[85%] ml-auto';
            userDiv.textContent = msg;
            chatMessages.appendChild(userDiv);
            document.getElementById('chat-input').value = '';
            setTimeout(() => {
                const aiDiv = document.createElement('div');
                aiDiv.className = 'bg-gray-100 rounded-xl px-3 py-2 text-sm max-w-[85%]';
                aiDiv.textContent = getAIResponse(msg);
                chatMessages.appendChild(aiDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }, 600);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        });
    </script>
